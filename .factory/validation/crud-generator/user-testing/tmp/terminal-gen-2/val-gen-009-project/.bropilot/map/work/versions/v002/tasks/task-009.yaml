context:
  entities:
    entities:
      - attributes:
          - path
          - name
          - purpose
          - recipe_name
        description: A Bropilot project rooted at a directory with .bropilot/ inside. Has a recipe and a map.
        name: Project
      - attributes:
          - name
          - version
          - description
          - acts
          - steps
          - dir
        description: "Defines the pipeline configuration: acts, steps, prompts, schemas, validations."
        name: Recipe
      - attributes:
          - current_step_index
          - completed_steps
          - recipe
        description: The execution engine that tracks progress through recipe steps and enforces gates.
        name: Pipeline
      - attributes:
          - id
          - name
          - space
          - space_slots
          - knowledge_contributes
          - measurement_contributes
          - prompt
        description: A unit of pipeline work. Maps to a primary space, has a prompt, and produces map data.
        name: Step
      - attributes:
          - id
          - name
          - description
          - governs
          - required_slots
          - cross_cutting?
        description: An immutable thinking category with required slots and gate validation.
        name: Space
      - attributes:
          - id
          - name
          - type
          - required
        description: A named data location within a space. File slots hold a single YAML file, directory slots hold multiple.
        name: Slot
      - attributes:
          - number
          - snapshot
          - changes
          - tasks
        description: A snapshot of problem + solution spaces with associated changes and tasks.
        name: Version
      - attributes:
          - id
          - title
          - description
          - context
          - definition_of_done
          - dependencies
          - priority
          - related_specs
          - status
        description: A work item generated from a spec change. Dispatched to coding agents.
        name: Task
      - attributes:
          - path
          - type
          - task_id
          - version
        description: "Output produced by a completed task: code files, tests, DB interfaces."
        name: Artifact
  relationships:
    relationships:
      - description: A project has exactly one active recipe
        from: Project
        to: Recipe
        type: has_one
      - description: A project has one map directory with all space data
        from: Project
        to: Map
        type: has_one
      - description: A recipe defines an ordered list of pipeline steps
        from: Recipe
        to: Step
        type: has_many
      - description: Each step maps to exactly one primary space
        from: Step
        to: Space
        type: belongs_to
      - description: Each space has required slots that must be filled
        from: Space
        to: Slot
        type: has_many
      - description: A version generates multiple tasks from its change plan
        from: Version
        to: Task
        type: has_many
      - description: A completed task produces one or more artifacts
        from: Task
        to: Artifact
        type: produces
      - description: Completed tasks update changelog, xrefs, and glossary in the Knowledge Space
        from: Task
        to: Knowledge
        type: feeds_back
      - description: Pipeline checks gate validation when crossing space boundaries
        from: Pipeline
        to: Space
        type: validates_gate
definition_of_done:
  - Implementation matches spec
  - Tests written and passing
  - Documentation updated
dependencies: []
description: New spec added at solution.domain. Implement the corresponding functionality.
id: 9
priority: high
related_specs:
  - solution.domain
status: pending
